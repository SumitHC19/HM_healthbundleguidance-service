    activate:
      on-profile: qa
  application:
    name: bundleguidance-qa

# AWS DocumentDB configuration for QA environment
# Default configuration for AWS ECS deployment
# Environment variables: MONGO_HOST, MONGO_PORT, MONGO_USERNAME, MONGO_PASSWORD, MONGO_DATABASE, MONGO_PARAMS
bundleguidance:
  mongo:
    host: ${MONGO_HOST}
    port: ${MONGO_PORT}
    username: ${MONGO_USERNAME}
    password: ${MONGO_PASSWORD}  # Required: Set via ECS Task Definition or Secrets Manager
    database: ${MONGO_DATABASE}
    params: ${MONGO_PARAMS}

