---
# PROD Environment Profile
spring:
  config:
    activate:
      on-profile: prod
  application:
    name: bundleguidance-prod

# AWS DocumentDB configuration for PROD environment
# All values must be provided via environment variables for production
# Default configuration for AWS ECS deployment
# Environment variables: MONGO_HOST, MONGO_PORT, MONGO_USERNAME, MONGO_PASSWORD, MONGO_DATABASE, MONGO_PARAMS
bundleguidance:
  mongo:
    host: ${MONGO_HOST}  # Required: Set via ECS Task Definition
    port: ${MONGO_PORT:27017}
    username: ${MONGO_USERNAME}  # Required: Set via ECS Task Definition or Secrets Manager
    password: ${MONGO_PASSWORD}  # Required: Set via ECS Task Definition or Secrets Manager
    database: ${MONGO_DATABASE}  # Required: Set via ECS Task Definition
    params: ${MONGO_PARAMS:tls=true&tlsAllowInvalidHostnames=true&retryWrites=false&authSource=admin}

---
# Test Profile
spring:
  config:
    activate:
      on-profile: test
  application:
    name: bundleguidance-test
  data:
    mongodb:
      uri: mongodb://admin:admin123@local-mongodb:27017/personHealthDataDV?authSource=admin  # pragma: allowlist secret
