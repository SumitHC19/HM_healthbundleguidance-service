openapi: 3.0.3
info:
  title: Health Package Guidance API
  version: 1.0.0
  description: |
    API returning health bundle guidance evaluation results, including bundle rankings, estimated costs (adverse/expected scenarios), plan/product uses, and vignette summaries. This spec also contains bundle selection and evaluation input data operations.

termsOfService: http://alight.com/terms
contact:
  name: Alight API Team
  email: api@alight.com
  url: https://alight.com/apis
license:
  name: Proprietary License
servers:
  - url: https://api-dv.alight.com/api
    description: Development environment
  - url: https://api-qa.alight.com/api
    description: Quality Assurance environment
  - url: https://api-ste.alight.com/api
    description: Stress Test environment
  - url: https://api-qc.alight.com/api
    description: Quality Control environment
  - url: https://api.alight.com/api
    description: Production environment
  - url: http://localhost/api
    description: Local Development environment

