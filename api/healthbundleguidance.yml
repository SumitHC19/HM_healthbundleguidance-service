  /bundle/selection:
    get:
      tags:
        - Bundles
      summary: Returns the details of the bundle selected by the user.
      description: Returns the details of the bundle selected by the user.
      operationId: getSelection
      parameters:
        - name: alightRequestHeader
          in: header
          description: Request Header.
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: alightPersonSessionToken
          in: header
          description: Session Token generated by startSessionForPerson call
          schema:
            type: string
          required: true
        - name: platformInternalId
          in: header
          required: true
          schema:
            type: string
          description: Unique identifier of the user on platform.
        - name: businessProcessReferenceId
          in: query
          required: true
          schema:
            type: string
          description: Unique identifier of the activity type.
        - name: evaluationid
          in: query
          required: false
          schema:
            type: string
          description: Unique identifier of the evaluation.
      responses:
        '200':
          description: Evaluation returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleSelectionPayload'
              example:
                evaluationId: '123456789'
                clientId: '19968'
                platformInternalId: '43256787'
                businessProcessReferenceId: '12345'
                featuredAs: balanced
                planYearBeginDate: '2026-04-01'
                lastModifiedTimeStamp: '2026-02-03T10:00:00Z'
        '204':
          description: Bundle selection not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Bundle selection not found
        '400':
          $ref: '#/components/ErrorResponses/BadRequest'
        '401':
          $ref: '#/components/ErrorResponses/Unauthorized'
        '403':
          $ref: '#/components/ErrorResponses/Forbidden'
        '500':
          $ref: '#/components/ErrorResponses/InternalServerError'

    put:
      tags:
        - Bundles
      summary: Updating the bundle selection for the user.
      description: Updating the user selection of any one bundle out of the all
        recommendations provided by Savvi.
      operationId: putSelection
      parameters:
        - name: alightRequestHeader
          in: header
          description: Request Header.
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: alightPersonSessionToken
          in: header
          description: Session Token generated by startSessionForPerson call
          schema:
            type: string
          required: true
        - name: platformInternalId
          in: header
          required: true
          schema:
            type: string
          description: Unique identifier of the user on platform.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BundleSelectionPayload'
            example:
              evaluationId: '123456789'
              clientId: '19968'
              platformInternalId: '43256787'
              businessProcessReferenceId: '12345'
              featuredAs: balanced
              planYearBeginDate: ''
              lastModifiedTimeStamp: ''
      responses:
        '200':
          description: Evaluation updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BundleSelectionPayload'
              example:
                evaluationId: '123456789'
                clientId: '19968'
                platformInternalId: '43256787'
                businessProcessReferenceId: '12345'
                featuredAs: balanced
                planYearBeginDate: '2026-04-01'
                lastModifiedTimeStamp: '2026-02-03T10:00:00Z'
        '400':
          $ref: '#/components/ErrorResponses/BadRequest'
        '401':
          $ref: '#/components/ErrorResponses/Unauthorized'
        '403':
          $ref: '#/components/ErrorResponses/Forbidden'
        '500':
          $ref: '#/components/ErrorResponses/InternalServerError'

  /bundle/evaluationinput:
    get:
      tags:
        - Bundles
      summary: Get evaluation input by businessProcessReferenceId or evaluationid.
      operationId: getEvaluationInput
      parameters:
        - name: alightRequestHeader
          in: header
          description: Request Header.
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: alightPersonSessionToken
          in: header
          description: Session Token generated by startSessionForPerson call
          schema:
            type: string
          required: true
        - name: platformInternalId
          in: header
          required: true
          schema:
            type: string
          description: Unique identifier of the user on platform.
        - name: businessProcessReferenceId
          in: query
          required: true
          schema:
            type: string
          description: Unique identifier of the activity type.
        - name: evaluationid
          in: query
          required: false
          schema:
            type: string
          description: Unique identifier of the evaluation.
      responses:
        '200':
          description: Evaluation input found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationInput'
              examples:
                sample:
                  $ref: '#/components/examples/EvaluationInputExample'
        '204':
          description: Evaluation input not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Evaluation input not found
        '400':
          $ref: '#/components/ErrorResponses/BadRequest'
        '401':
          $ref: '#/components/ErrorResponses/Unauthorized'
        '403':
          $ref: '#/components/ErrorResponses/Forbidden'
        '500':
          $ref: '#/components/ErrorResponses/InternalServerError'

    put:
      tags:
        - Bundles
      summary: Save evaluation input along with evaluation identifier.
      operationId: putEvaluationInput
      parameters:
        - name: alightRequestHeader
          in: header
          description: Request Header.
          required: true
          style: simple
          explode: false
          schema:
            type: string
        - name: alightPersonSessionToken
          in: header
          description: Session Token generated by startSessionForPerson call
          schema:
            type: string
          required: true
        - name: platformInternalId
          in: header
          required: true
          schema:
            type: string
          description: Unique identifier of the user on platform.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluationInput'
            examples:
              sample:
                $ref: '#/components/examples/EvaluationInputExample'
      responses:
        '200':
          description: Evaluation input saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvaluationInput'
        '400':
          $ref: '#/components/ErrorResponses/BadRequest'
        '401':
          $ref: '#/components/ErrorResponses/Unauthorized'
        '403':
          $ref: '#/components/ErrorResponses/Forbidden'
        '500':
          $ref: '#/components/ErrorResponses/InternalServerError'

components:
  schemas:
    EvaluationResult:
      type: object
      properties:
        eventType:
          type: string
          example: evaluation_result
        evaluationId:
          type: string
          example: '123456789'
        evaluationType:
          type: string
          example: selectsmart:bundles
        evaluationStatus:
          type: string
          example: success
        evaluationOutput:
          $ref: '#/components/schemas/EvaluationOutput'
      required:
        - eventType
        - evaluationId
        - evaluationType
        - evaluationStatus
        - evaluationOutput

    EvaluationOutput:
      type: object
      properties:
        bundles:
          type: array
          items:
            $ref: '#/components/schemas/Bundle'

    Bundle:
      type: object
      properties:
        bundleRank:
          type: integer
          format: int32
          example: 2
        estimatedCosts:
          $ref: '#/components/schemas/EstimatedCosts'
        featuredAs:
          type: string
          description: Label describing how this bundle is featured.
          example: balanced
        featuredAsVariants:
          type: array
          items:
            type: string
          example:
            - balanced
            - lower_adverse
            - lower_deductible
            - balanced_non_hdhp
            - none
        isCustomizable:
          type: boolean
          example: true
        planUses:
          type: array
          items:
            $ref: '#/components/schemas/PlanUse'
        productUses:
          type: array
          items:
            $ref: '#/components/schemas/ProductUse'
        vignettes:
          $ref: '#/components/schemas/Vignettes'
      required:
        - bundleRank
        - estimatedCosts
        - featuredAs
        - featuredAsVariants
        - productUses

    EstimatedCosts:
      type: object
      properties:
        adverse:
          $ref: '#/components/schemas/EstimatedCostScenario'
        expected:
          $ref: '#/components/schemas/EstimatedCostScenario'

    EstimatedCostScenario:
      type: object
      properties:
        accounts:
          $ref: '#/components/schemas/Accounts'
        outofpocketBreakdown:
          $ref: '#/components/schemas/OutOfPocketBreakdown'
        totalCost:
          type: number
          format: double
        totalEmployerContributionsExSihra:
          type: number
          format: double
        totalIndemnityPayouts:
          type: number
          format: double
        totalIndemnityPremiums:
          type: number
          format: double
        totalIndemnityWellnessBenefits:
          type: number
          format: double
        totalOutofpocket:
          type: number
          format: double
        totalOutofpocketCredit:
          type: number
          format: double
        totalPremiumCredit:
          type: number
          format: double
        totalPremiums:
          type: number
          format: double
        totalTaxSavings:
          type: number
          format: double
      required:
        - totalCost
        - totalIndemnityPremiums
        - totalPremiums
        - totalOutofpocketCredit
        - totalTaxSavings

    Accounts:
      type: object
      properties:
        balanceUsage:
          $ref: '#/components/schemas/FsaHsaHraLpfsaAmounts'
        employeeContributions:
          $ref: '#/components/schemas/FsaHsaHraLpfsaAmounts'
        employerContributions:
          $ref: '#/components/schemas/FsaHsaHraLpfsaAmounts'
        employerMatching:
          type: number
          format: double
          nullable: true
          description: Employer matching amount (if applicable).
        rollovers:
          $ref: '#/components/schemas/FsaHsaHraLpfsaAmounts'

    FsaHsaHraLpfsaAmounts:
      type: object
      properties:
        fsaSpouse:
          type: number
          format: double
          nullable: true
        fsaSubscriber:
          type: number
          format: double
          nullable: true
        fsaTotal:
          type: number
          format: double
          nullable: true
        hraSpouse:
          type: number
          format: double
          nullable: true
        hraSubscriber:
          type: number
          format: double
          nullable: true
        hraTotal:
          type: number
          format: double
          nullable: true
        hsaSpouse:
          type: number
          format: double
          nullable: true
        hsaSubscriber:
          type: number
          format: double
          nullable: true
        hsaTotal:
          type: number
          format: double
          nullable: true
        lpfsaSpouse:
          type: number
          format: double
          nullable: true
        lpfsaSubscriber:
          type: number
          format: double
          nullable: true
        lpfsaTotal:
          type: number
          format: double
          nullable: true

    OutOfPocketBreakdown:
      type: object
      properties:
        byCategory:
          type: object
          properties:
            doctorVisits:
              type: number
              format: double
            emergencyRoomVisits:
              type: number
              format: double
            hospitalVisits:
              type: number
              format: double
            labsOrTests:
              type: number
              format: double
            other:
              type: number
              format: double
            prescriptionDrugs:
              type: number
              format: double
            specialistVisits:
              type: number
              format: double
        byPerson:
          type: object
          additionalProperties:
            type: number
            format: double
          description: |
            Map of personId to out-of-pocket amount. Keys are person identifiers.
        byProduct:
          type: object
          additionalProperties:
            type: number
            format: double
          description: |
            Map of productId to out-of-pocket amount. Keys are product identifiers.

    PlanUse:
      type: object
      properties:
        coverageFrom:
          type: string
          example: subscriber
        coverageId:
          type: string
          description: Coverage identifier (may be truncated/obfuscated in examples).
        coveredPeople:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              level:
                type: number
                format: double
                nullable: true
            required:
              - id
        employeeContribution:
          type: number
          format: double
        offerId:
          type: string
        planId:
          type: string
        productId:
          type: string
        type:
          type: string
          example: medical_plan
      required:
        - planId

    ProductUse:
      type: object
      properties:
        coverageFrom:
          type: string
        coveredPeople:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              level:
                type: number
                format: double
                nullable: true
            required:
              - id
        employeeContribution:
          type: number
          format: double
        employerContribution:
          type: number
          format: double
        excludedPeopleIds:
          type: array
          items:
            type: string
        ineligiblePeopleIds:
          type: array
          items:
            type: string
        numDeductionsPlanyear:
          type: integer
          format: int32
        numDeductionsRemaining:
          type: integer
          format: int32
        premium:
          type: number
          format: double
        productId:
          type: string
        totalPremiums:
          type: number
          format: double
        type:
          type: string
        vsCurrent:
          $ref: '#/components/schemas/ProductUseComparison'
      required:
        - productId

    ProductUseComparison:
      type: object
      properties:
        premiumChange:
          type: number
          format: double
        coverageChanges:
          type: array
          items:
            type: object
            properties:
              changeType:
                type: string
                example: added
              personId:
                type: string
            required:
              - changeType
              - personId
        employeeContributionChange:
          type: number
          format: double

    Vignettes:
      type: object
      properties:
        bundlePlanCosts:
          type: object
          properties:
            baseBundle:
              $ref: '#/components/schemas/VignetteBundlePlanCost'
        closestComparison:
          type: object
