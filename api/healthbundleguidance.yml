    ErrorProblem:
      type: object
      description: Standard error envelope using RFC 7807-style fields.
      properties:
        type:
          type: string
          format: uri
          description: URI identifier for the error type.
          example: https://api.example.com/errors/validation
        title:
          type: string
          description: Short, human-readable summary of the error.
          example: Validation Error
        status:
          type: integer
          description: HTTP status code.
          example: 400
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence of the
            problem.
          example: birthdate must be in YYYY-MM-DD format.
        instance:
          type: string
          format: uri
          description: URI reference to the specific error occurrence.
          example: https://api.example.com/health-profile?requestId=abc123
        correlationId:
          type: string
          description: Correlation ID for tracing.
          example: abc123
        errorCode:
          type: string
          description: Machine-readable application error code.
          example: VALIDATION_FAILED
        errors:
          type: array
          description: Field-level validation errors (if applicable).
          items:
            $ref: '#/components/schemas/FieldError'
      required:
        - title
        - status

    FieldError:
      type: object
      properties:
        field:
          type: string
          description: The field path that failed validation.
          example: healthProfileData[0].healcareUtilization[0].subscriberDetails[0].birthdate
        message:
          type: string
          description: Human-readable validation message.
          example: Must be a valid date in format YYYY-MM-DD.
        code:
          type: string
          description: Optional machine-readable validation code.
          example: INVALID_DATE
      required:
        - field
        - message

  ErrorResponses:
    BadRequest:
      description: The request could not be understood by the server due to malformed
        syntax or validation errors.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorProblem'
          examples:
            example:
              value:
                type: https://api.example.com/errors/validation
                title: Validation Error
                status: 400
                detail: One or more fields are invalid.
                correlationId: req-12345
                errorCode: VALIDATION_FAILED
                errors:
                  - field: evaluationid
                    message: Evaluation id must be present to retrive recommended bundles/packages.
                    code: REQUIRED
                  - field: alightRequestHeader
                    message: Alight request header must be present.
                    code: REQUIRED
                  - field: alightPersonSessionToken
                    message: Person session token must be present
                    code: REQUIRED

    Unauthorized:
      description: Authentication is required and has failed or has not yet been provided.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorProblem'
          examples:
            example:
              value:
                type: https://api.example.com/errors/unauthorized
                title: Unauthorized
                status: 401
                detail: Missing or invalid access token.
                correlationId: req-67890
                errorCode: AUTH_REQUIRED

    Forbidden:
      description: The request was valid, but the server is refusing action due to
        insufficient permissions.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorProblem'
          examples:
            example:
              value:
                type: https://api.example.com/errors/forbidden
                title: Forbidden
                status: 403
                detail: You do not have permission to access this resource.
                correlationId: req-24680
                errorCode: INSUFFICIENT_SCOPE

    InternalServerError:
      description: An unexpected error occurred on the server.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorProblem'
          examples:
            example:
              value:
                type: https://api.example.com/errors/server
                title: Internal Server Error
                status: 500
                detail: Unexpected error occurred.
                correlationId: req-ise-001
                errorCode: UNEXPECTED_ERROR

    UnexpectedError:
      description: Unexpected error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorProblem'

